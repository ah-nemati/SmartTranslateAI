name: SmartTranslateAi - Enterprise Build System

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.11"
  APP_NAME: SmartTranslateAi

jobs:
  # ================= WINDOWS (PySide6) =================
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
      - name: Build Windows EXE
        run: |
          pyinstaller --clean --onefile --windowed --name ${{ env.APP_NAME }} app/main.py
      - uses: actions/upload-artifact@v4
        with:
          name: SmartTranslateAi-Windows
          path: dist/*.exe

  # ================= LINUX (PySide6) =================
  linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-0 libgl1 libx11-6 libxext6 libxrender1 \
            libxcb1 libxcb-cursor0 libxkbcommon-x11-0 libdbus-1-3 libnss3 \
            libfontconfig1 libfreetype6 libegl1 libasound2t64
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
      - name: Build Linux Binary
        run: |
          pyinstaller --clean --onefile --windowed --name ${{ env.APP_NAME }} app/main.py
      - uses: actions/upload-artifact@v4
        with:
          name: SmartTranslateAi-Linux
          path: dist/*

  # ================= ANDROID (Kivy + Buildozer) =================
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Buildozer & System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk build-essential \
            libffi-dev libssl-dev pkg-config
          pip install --upgrade pip
          pip install buildozer cython kivy==2.3.0
      - name: Build Android APK
        run: |
          cd app
          buildozer -v android debug
      - uses: actions/upload-artifact@v4
        with:
          name: SmartTranslateAi-Android
          path: app/bin/*.apk

  # ================= CREATE RELEASE =================
  release:
    needs: [windows, linux, android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: SmartTranslateAi ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            artifacts/SmartTranslateAi-Windows/*.exe
            artifacts/SmartTranslateAi-Linux/*
            artifacts/SmartTranslateAi-Android/*.apk
          body: |
            ### SmartTranslateAi Enterprise Build
            - Windows: EXE
            - Linux: Binary
            - Android: APK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
