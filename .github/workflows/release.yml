name: SmartTranslateAi - Cross Platform Enterprise Build System

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.11"
  APP_NAME: SmartTranslateAi
  LINUX_PACKAGE_NAME: smarttranslateai

jobs:
  # =========================================================
  # JOB 1: ANDROID (FIRST - MUST PASS)
  # =========================================================
  android:
    name: Android Build (FIRST)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: HARD CLEAN BUILDOZER CACHE
        run: |
          rm -rf ~/.buildozer
          rm -rf .buildozer
          rm -rf ~/.cache/python-for-android || true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            git zip unzip wget curl \
            openjdk-17-jdk \
            build-essential cmake ninja-build lld \
            autoconf automake libtool pkg-config \
            zlib1g-dev libffi-dev libssl-dev \
            libncurses6 libtinfo6 libstdc++6

      - name: Install Python dependencies (LATEST STABLE)
        run: |
          python -m pip install --upgrade pip

          pip install \
            buildozer \
            cython==0.29.36 \
            python-for-android \
            kivy

      - name: Build Android APK
        run: |
          cd app
          # Force log_level to 2 (debug) to expose the actual compiler error
          sed -i -e 's/^log_level = [0-9]/log_level = 2/' buildozer.spec

          buildozer android debug

      - name: Verify APK
        run: |
          find app/bin -name "*.apk" | grep apk || exit 1

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: app/bin/*.apk

  # =========================================================
  # JOB 2: WINDOWS (ONLY IF ANDROID SUCCESS)
  # =========================================================
  windows:
    name: Windows Build
    runs-on: windows-latest
    needs: android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        shell: pwsh
        run: |
          pyinstaller `
            --clean `
            --noconfirm `
            --onefile `
            --windowed `
            --name "${{ env.APP_NAME }}" `
            --hidden-import=PySide6.QtCore `
            --hidden-import=PySide6.QtGui `
            --hidden-import=PySide6.QtWidgets `
            --hidden-import=PySide6.QtNetwork `
            --collect-all PySide6 `
            --collect-all aiohttp `
            app/main.py

      - name: Verify EXE
        shell: pwsh
        run: |
          if (!(Test-Path "dist/${{ env.APP_NAME }}.exe")) {
            Write-Error "Windows EXE not found"
            exit 1
          }

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/${{ env.APP_NAME }}.exe

  # =========================================================
  # JOB 3: LINUX (ONLY IF WINDOWS SUCCESS)
  # =========================================================
  linux:
    name: Linux Build
    runs-on: ubuntu-24.04
    needs: windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            dpkg-dev fakeroot \
            libglib2.0-0 libgl1 libx11-6 libxext6 \
            libxrender1 libxcb1 libxcb-cursor0 \
            libxkbcommon-x11-0 libdbus-1-3 \
            libnss3 libfontconfig1 libfreetype6 \
            libegl1 libasound2t64

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Linux Binary
        run: |
          pyinstaller \
            --clean \
            --noconfirm \
            --onefile \
            --windowed \
            --name "${{ env.APP_NAME }}" \
            --collect-all PySide6 \
            --collect-all aiohttp \
            app/main.py

      - name: Verify Binary
        run: |
          test -f dist/${{ env.APP_NAME }} || exit 1

      - name: Create DEB package
        run: |
          mkdir -p package/usr/local/bin
          mkdir -p package/DEBIAN

          cp dist/${{ env.APP_NAME }} package/usr/local/bin/

          VERSION=${GITHUB_REF_NAME#v}

          cat > package/DEBIAN/control <<EOF
          Package: ${{ env.LINUX_PACKAGE_NAME }}
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: SmartTranslateAi
          Description: SmartTranslateAi Cross Platform Translator
          EOF

          dpkg-deb --build package \
            ${{ env.LINUX_PACKAGE_NAME }}-${VERSION}.deb

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            dist/${{ env.APP_NAME }}
            *.deb

  # =========================================================
  # JOB 4: RELEASE (ONLY IF ALL SUCCESS)
  # =========================================================
  release:
    name: Release
    runs-on: ubuntu-latest

    needs: [android, windows, linux]

    if: |
      needs.android.result == 'success' &&
      needs.windows.result == 'success' &&
      needs.linux.result == 'success'

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Validate artifacts
        run: |
          find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: SmartTranslateAi ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            artifacts/android/*.apk
            artifacts/windows/*.exe
            artifacts/linux/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
