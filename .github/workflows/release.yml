name: SmartTranslateAi - Cross Platform Enterprise Build System

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.11"
  APP_NAME: SmartTranslateAi
  LINUX_PACKAGE_NAME: smarttranslateai

jobs:
  # =========================================================
  # WINDOWS
  # =========================================================
  windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip

          pip install -r requirements.txt

          pip install pyinstaller

      - name: Build Windows EXE
        shell: pwsh
        run: |
          pyinstaller `
            --clean `
            --noconfirm `
            --onefile `
            --windowed `
            --name "${{ env.APP_NAME }}" `
            --hidden-import=PySide6.QtCore `
            --hidden-import=PySide6.QtGui `
            --hidden-import=PySide6.QtWidgets `
            --hidden-import=PySide6.QtNetwork `
            --collect-all PySide6 `
            --collect-all aiohttp `
            app/main.py

      - name: Verify EXE
        shell: pwsh
        run: |
          if (!(Test-Path "dist/${{ env.APP_NAME }}.exe")) {
            Write-Error "Windows EXE not found"
            exit 1
          }

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/${{ env.APP_NAME }}.exe

  # =========================================================
  # LINUX
  # =========================================================
  linux:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system libraries
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            dpkg-dev \
            fakeroot \
            libglib2.0-0 \
            libgl1 \
            libx11-6 \
            libxext6 \
            libxrender1 \
            libxcb1 \
            libxcb-cursor0 \
            libxkbcommon-x11-0 \
            libdbus-1-3 \
            libnss3 \
            libfontconfig1 \
            libfreetype6 \
            libegl1 \
            libasound2t64

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          pip install -r requirements.txt

          pip install pyinstaller

      - name: Build Linux Binary
        run: |
          pyinstaller \
            --clean \
            --noconfirm \
            --onefile \
            --windowed \
            --name "${{ env.APP_NAME }}" \
            --hidden-import=PySide6.QtCore \
            --hidden-import=PySide6.QtGui \
            --hidden-import=PySide6.QtWidgets \
            --hidden-import=PySide6.QtNetwork \
            --hidden-import=PySide6.QtXcbQpa \
            --collect-all PySide6 \
            --collect-all aiohttp \
            app/main.py

      - name: Verify Binary
        run: |
          test -f dist/${{ env.APP_NAME }} || exit 1

          chmod +x dist/${{ env.APP_NAME }}

      # =====================================================
      # CREATE DEB PACKAGE
      # =====================================================
      - name: Create Debian package structure
        run: |
          mkdir -p package/DEBIAN

          mkdir -p package/usr/local/bin

          mkdir -p package/usr/share/applications

          cp dist/${{ env.APP_NAME }} package/usr/local/bin/

      - name: Create desktop entry
        run: |
          cat > package/usr/share/applications/${{ env.LINUX_PACKAGE_NAME }}.desktop <<EOF
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=SmartTranslateAi
          Exec=/usr/local/bin/${{ env.APP_NAME }}
          Terminal=false
          Categories=Utility;
          EOF

      - name: Create control file
        run: |
          VERSION=${GITHUB_REF_NAME#v}

          cat > package/DEBIAN/control <<EOF
          Package: ${{ env.LINUX_PACKAGE_NAME }}
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: SmartTranslateAi
          Description: SmartTranslateAi Cross Platform Translator
          EOF

      - name: Build DEB
        run: |
          VERSION=${GITHUB_REF_NAME#v}

          dpkg-deb --build package \
            ${{ env.LINUX_PACKAGE_NAME }}-${VERSION}-amd64.deb

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            dist/${{ env.APP_NAME }}
            *.deb

  # =========================================================
  # ANDROID
  # =========================================================
  android:
    runs-on: ubuntu-latest

    env:
      ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk
      ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            git \
            zip \
            unzip \
            wget \
            openjdk-17-jdk \
            build-essential \
            autoconf \
            automake \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5 \
            libstdc++6 \
            libffi-dev \
            libssl-dev

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip

          pip install \
            buildozer \
            cython \
            kivy==2.3.0

      # =====================================================
      # INSTALL ANDROID SDK
      # =====================================================
      - name: Install Android SDK
        run: |
          mkdir -p $ANDROID_HOME/cmdline-tools

          cd /tmp

          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip

          unzip commandlinetools-linux-11076708_latest.zip

          mv cmdline-tools $ANDROID_HOME/cmdline-tools/latest

          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH

          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH

          echo "$ANDROID_HOME/build-tools/37.0.0" >> $GITHUB_PATH

      - name: Accept Android Licenses
        run: |
          yes | sdkmanager --licenses

      - name: Install Android SDK Packages
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;37.0.0"

      - name: Verify SDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"

          find $ANDROID_HOME -name aidl

          test -f $ANDROID_HOME/build-tools/37.0.0/aidl

      - name: Verify buildozer.spec
        run: |
          test -f app/buildozer.spec || \
          (echo "Missing buildozer.spec" && exit 1)

      - name: Build APK
        run: |
          cd app

          buildozer android debug

      - name: Verify APK
        run: |
          find app/bin -name "*.apk" | grep apk || exit 1

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: app/bin/*.apk

  # =========================================================
  # RELEASE
  # =========================================================
  release:
    needs: [windows, linux, android]

    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Validate release files
        run: |
          test -f artifacts/windows/${APP_NAME}.exe || exit 1

          test -f artifacts/linux/${APP_NAME} || exit 1

          find artifacts/linux -name "*.deb" | grep deb || exit 1

          find artifacts/android -name "*.apk" | grep apk || exit 1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}

          name: SmartTranslateAi ${{ github.ref_name }}

          generate_release_notes: true

          draft: false

          prerelease: false

          files: |
            artifacts/windows/*.exe
            artifacts/linux/*.deb
            artifacts/linux/SmartTranslateAi
            artifacts/android/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
